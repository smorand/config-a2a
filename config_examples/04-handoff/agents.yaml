name: handoff-server
version: 0.1.0
description: Routes user questions to a math sub-agent or a chat sub-agent.

server:
  host: 0.0.0.0
  port: 9004

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/handoff-server.db
  run_migrations_on_start: true

observability:
  otel:
    enabled: true
    service_name: handoff-server
    exporter: jsonl
    jsonl_path: traces/handoff-server.jsonl

admin:
  enabled: true

agents:
  - slug: router
    name: handoff-router
    description: Routes user questions to a math sub-agent or a chat sub-agent.
    model:
      provider: openai-compatible
      model: openrouter/auto:free
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
    pattern:
      type: handoff
      router:
        prompt_file: prompts/router.md
      targets:
        - name: math
          description: Solve arithmetic and small symbolic problems.
          agent_ref: ./math.yaml
        - name: chat
          description: Open-ended conversation, jokes, and explanations.
          agent_ref: ./chat.yaml
    prompts:
      system: |
        You are a high-level dispatcher. Always delegate to one expert.
    guardrails:
      max_loops: 20
      max_tokens: 16000
      max_depth: 3
    skills:
      - id: dispatch
        name: Dispatcher
        description: Picks math or chat sub-agent.
        examples:
          - "What is 17 * 23?"
          - "Tell me a joke about robots."

  - slug: math
    name: math-subagent
    description: Solves arithmetic problems in one short paragraph.
    model:
      provider: openai-compatible
      model: openrouter/auto:free
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
    pattern:
      type: simple
    prompts:
      system: |
        You are a careful arithmetic assistant. Show your steps briefly, then state the final number.
    guardrails:
      max_loops: 5
      max_tokens: 4000

  - slug: chat
    name: chat-subagent
    description: Friendly conversational sub-agent.
    model:
      provider: openai-compatible
      model: openrouter/auto:free
      api_key_env: OPENROUTER_API_KEY
      base_url: https://openrouter.ai/api/v1
    pattern:
      type: simple
    prompts:
      system: |
        You are a friendly conversationalist. Keep replies short and warm.
    guardrails:
      max_loops: 4
      max_tokens: 4000
