name: chat-subagent
version: 0.1.0
description: Friendly conversational sub-agent.

model:
  provider: openai-compatible
  model: openrouter/auto:free
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

pattern:
  type: simple

prompts:
  system: |
    You are a friendly conversationalist. Keep replies short and warm.

guardrails:
  max_loops: 4
  max_tokens: 4000
