name: coding-agent
version: 0.1.0
description: Drives a user story through 8 phases by chaining 8 A2A servers (ports 9101-9108).

server:
  host: 0.0.0.0
  port: 9100

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.6-flash
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.0
  max_output_tokens: 500
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-orchestrator

pattern:
  type: orchestrate
  mode: sequential
  agents:
    - name: classification
      a2a_url: http://localhost:9101
      input_template: "{{ user_text }}"
    - name: dor
      a2a_url: http://localhost:9102
      input_template: "{{ user_text }}"
    - name: comprehension
      a2a_url: http://localhost:9103
      input_template: "{{ user_text }}"
    - name: planning
      a2a_url: http://localhost:9104
      input_template: "{{ user_text }}"
    - name: e2e_writing
      a2a_url: http://localhost:9105
      input_template: "{{ user_text }}"
    - name: implementation
      a2a_url: http://localhost:9106
      input_template: "{{ user_text }}"
    - name: review
      a2a_url: http://localhost:9107
      input_template: "{{ user_text }}"
    - name: pr_creation
      a2a_url: http://localhost:9108
      input_template: "{{ user_text }}"
  aggregator:
    prompt_file: prompts/orchestrator.md

prompts:
  system: |
    You orchestrate an 8-phase ticket-to-PR pipeline. The phase servers
    communicate by reading and writing files under .agent_work/<ticket_id>/.
    The final output is the PR URL produced by phase 8.

guardrails:
  max_loops: 1
  max_tokens: 200000
  timeout_seconds: 3600  # config-a2a caps this at 1h; agent-coding allows 4h.
  max_depth: 1

observability:
  otel:
    enabled: true
    service_name: coding-agent
    exporter: jsonl
    jsonl_path: traces/coding-agent/orchestrator.jsonl

skills:
  - id: ticket-to-pr
    name: Ticket-to-PR
    description: >-
      Walks an entire user story (classification, DoR, comprehension, planning,
      E2E writing, implementation, review, PR creation) and returns the merged
      PR URL.
    tags: [coding, pipeline]
    examples:
      - "specs/tickets/CR-001.md"

authentication:
  type: none
