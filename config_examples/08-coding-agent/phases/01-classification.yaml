name: coding-agent-classification
version: 0.1.0
description: Phase 1/8 — detect the project type from the ticket and workspace.

server:
  host: 0.0.0.0
  port: 9101

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent-classification.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.5-9b
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.0
  max_output_tokens: 1500
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-classification

pattern:
  type: simple

prompts:
  system_file: ../prompts/01-classification.md

tools:
  mcp_servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    - name: git
      transport: stdio
      command: uvx
      args: ["mcp-server-git", "--repository", "."]
  filters:
    exclude: ["fs.delete*", "fs.move*"]

confirmations:
  destructive_hint: auto_deny
  per_tool:
    "fs.write_file": auto_approve

guardrails:
  max_loops: 10
  max_tokens: 30000
  timeout_seconds: 300

observability:
  otel:
    enabled: true
    service_name: coding-agent-classification
    exporter: jsonl
    jsonl_path: traces/coding-agent/01-classification.jsonl

skills:
  - id: classify
    name: Classify project
    description: Detect project type from the ticket and workspace.
    tags: [coding, classification]
    examples:
      - "specs/tickets/CR-001.md"

authentication:
  type: none
