name: coding-agent-e2e-writing
version: 0.1.0
description: Phase 5/8 — translate acceptance criteria into runnable E2E tests.

server:
  host: 0.0.0.0
  port: 9105

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent-e2e-writing.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.6-27b
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.1
  max_output_tokens: 6000
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-e2e-writing

pattern:
  type: simple

prompts:
  system_file: ../prompts/05-e2e-writing.md

tools:
  mcp_servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    - name: git
      transport: stdio
      command: uvx
      args: ["mcp-server-git", "--repository", "."]
  filters:
    exclude: ["fs.delete*", "fs.move*"]

confirmations:
  destructive_hint: auto_deny
  per_tool:
    "fs.write_file": auto_approve
    "git.commit": auto_approve

guardrails:
  max_loops: 25
  max_tokens: 80000
  timeout_seconds: 1200

observability:
  otel:
    enabled: true
    service_name: coding-agent-e2e-writing
    exporter: jsonl
    jsonl_path: traces/coding-agent/05-e2e-writing.jsonl

skills:
  - id: e2e
    name: E2E test authoring
    description: Convert acceptance criteria to runnable pytest tests.
    tags: [coding, tests]

authentication:
  type: none
