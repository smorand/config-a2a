name: coding-agent-implementation
version: 0.1.0
description: Phase 6/8 — iterate on production code until the E2E tests pass.

server:
  host: 0.0.0.0
  port: 9106

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent-implementation.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.6-27b
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.2
  max_output_tokens: 8000
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-implementation

pattern:
  type: simple

prompts:
  system_file: ../prompts/06-implementation.md

tools:
  mcp_servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    - name: git
      transport: stdio
      command: uvx
      args: ["mcp-server-git", "--repository", "."]
    # NOTE: An MCP server exposing `pytest` and `make` is REQUIRED here but does
    # NOT ship with this repo. Wire it under a `shell` or `tests` name when
    # available. Anti-cheat guard on `tests/e2e/*` paths is prompt-only.
  filters:
    exclude: ["fs.delete*", "fs.move*"]

confirmations:
  destructive_hint: auto_deny
  per_tool:
    "fs.write_file": auto_approve
    "fs.edit_file": auto_approve
    "git.commit": auto_approve

guardrails:
  max_loops: 60
  max_tokens: 200000
  timeout_seconds: 3600  # config-a2a caps this at 1h; agent-coding allows 2h.

observability:
  otel:
    enabled: true
    service_name: coding-agent-implementation
    exporter: jsonl
    jsonl_path: traces/coding-agent/06-implementation.jsonl

skills:
  - id: implement
    name: Implementation loop
    description: Edit source files until all E2E tests pass.
    tags: [coding, implementation]

authentication:
  type: none
