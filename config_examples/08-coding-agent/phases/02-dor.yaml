name: coding-agent-dor
version: 0.1.0
description: Phase 2/8 — Definition-of-Ready validation of the ticket.

server:
  host: 0.0.0.0
  port: 9102

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent-dor.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.5-9b
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.0
  max_output_tokens: 1500
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-dor

pattern:
  type: simple

prompts:
  system_file: ../prompts/02-dor.md

tools:
  mcp_servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
  filters:
    exclude: ["fs.delete*", "fs.move*"]

confirmations:
  destructive_hint: auto_deny
  per_tool:
    "fs.write_file": auto_approve

guardrails:
  max_loops: 8
  max_tokens: 20000
  timeout_seconds: 180

observability:
  otel:
    enabled: true
    service_name: coding-agent-dor
    exporter: jsonl
    jsonl_path: traces/coding-agent/02-dor.jsonl

skills:
  - id: dor
    name: Definition of Ready
    description: Validate that the ticket has goal, acceptance criteria, and scope.
    tags: [coding, gate]

authentication:
  type: none
