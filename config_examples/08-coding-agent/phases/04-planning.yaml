name: coding-agent-planning
version: 0.1.0
description: Phase 4/8 — emit plan.md, todo.md, and infra_needs.md.

server:
  host: 0.0.0.0
  port: 9104

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent-planning.db
  run_migrations_on_start: true

model:
  provider: openai-compatible
  model: qwen/qwen3.6-27b
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.1
  max_output_tokens: 6000
  extra_headers:
    HTTP-Referer: https://github.com/smorand/config-a2a
    X-Title: coding-agent-planning

pattern:
  type: simple

prompts:
  system_file: ../prompts/04-planning.md

tools:
  mcp_servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
    - name: ctx7
      transport: streamable-http
      url: http://localhost:9000
  filters:
    exclude: ["fs.delete*", "fs.move*"]

confirmations:
  destructive_hint: auto_deny
  per_tool:
    "fs.write_file": auto_approve

guardrails:
  max_loops: 15
  max_tokens: 60000
  timeout_seconds: 600

observability:
  otel:
    enabled: true
    service_name: coding-agent-planning
    exporter: jsonl
    jsonl_path: traces/coding-agent/04-planning.jsonl

skills:
  - id: plan
    name: Implementation planning
    description: Produce plan, TODO checklist, and infrastructure requirements.
    tags: [coding, planning]

authentication:
  type: none
