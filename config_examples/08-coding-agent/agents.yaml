name: coding-agent
version: 0.1.0
description: 8-phase ticket-to-PR pipeline (8 phase agents + 1 orchestrator).

server:
  host: 0.0.0.0
  port: 9100

persistence:
  backend: sqlite
  url: sqlite+aiosqlite:///./state/coding-agent.db
  run_migrations_on_start: true

observability:
  otel:
    enabled: true
    service_name: coding-agent
    exporter: jsonl
    jsonl_path: traces/coding-agent.jsonl

admin:
  enabled: true

# ---------------------------------------------------------------------------
# YAML anchors: shared bits factored out. Top-level keys starting with `_`
# are stripped by the loader, so this block exists only to feed the parser.
# ---------------------------------------------------------------------------
_anchors:
  # --- model variants -----------------------------------------------------
  openrouter_base: &openrouter
    provider: openai-compatible
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1

  model_9b_deterministic: &model_9b_deterministic
    <<: *openrouter
    model: qwen/qwen3.5-9b
    temperature: 0.0
    max_output_tokens: 1500

  model_flash: &model_flash
    <<: *openrouter
    model: qwen/qwen3.6-flash
    temperature: 0.2
    max_output_tokens: 4000

  model_27b_creative: &model_27b_creative
    <<: *openrouter
    model: qwen/qwen3.6-27b
    temperature: 0.1
    max_output_tokens: 6000

  model_27b_impl: &model_27b_impl
    <<: *openrouter
    model: qwen/qwen3.6-27b
    temperature: 0.2
    max_output_tokens: 8000

  model_27b_review: &model_27b_review
    <<: *openrouter
    model: qwen/qwen3.6-27b
    temperature: 0.0
    max_output_tokens: 4000

  model_27b_pr: &model_27b_pr
    <<: *openrouter
    model: qwen/qwen3.6-27b
    temperature: 0.1
    max_output_tokens: 3000

  model_orchestrator: &model_orchestrator
    <<: *openrouter
    model: qwen/qwen3.6-flash
    temperature: 0.0
    max_output_tokens: 500

  # --- MCP servers --------------------------------------------------------
  mcp_fs: &mcp_fs
    name: fs
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]

  mcp_git: &mcp_git
    name: git
    transport: stdio
    command: uvx
    args: ["mcp-server-git", "--repository", "."]

  # --- tool bundles -------------------------------------------------------
  tools_fs_only: &tools_fs_only
    mcp_servers:
      - *mcp_fs
    filters:
      exclude: ["fs.delete*", "fs.move*"]

  tools_fs_git: &tools_fs_git
    mcp_servers:
      - *mcp_fs
      - *mcp_git
    filters:
      exclude: ["fs.delete*", "fs.move*"]

  tools_fs_git_readonly: &tools_fs_git_readonly
    mcp_servers:
      - *mcp_fs
      - *mcp_git
    filters:
      exclude: ["fs.delete*", "fs.move*", "fs.edit*", "git.commit", "git.push"]

  # --- confirmations ------------------------------------------------------
  confirmations_write: &confirmations_write
    destructive_hint: auto_deny
    per_tool:
      "fs.write_file": auto_approve

  confirmations_write_commit: &confirmations_write_commit
    destructive_hint: auto_deny
    per_tool:
      "fs.write_file": auto_approve
      "git.commit": auto_approve

  confirmations_impl: &confirmations_impl
    destructive_hint: auto_deny
    per_tool:
      "fs.write_file": auto_approve
      "fs.edit_file": auto_approve
      "git.commit": auto_approve

  confirmations_push: &confirmations_push
    destructive_hint: auto_deny
    per_tool:
      "fs.write_file": auto_approve
      "git.push": auto_approve

agents:
  - slug: classification
    name: coding-agent-classification
    description: Phase 1/8 — detect the project type from the ticket and workspace.
    model: *model_9b_deterministic
    pattern: { type: simple }
    prompts: { system_file: prompts/01-classification.md }
    tools: *tools_fs_only
    confirmations: *confirmations_write
    guardrails: { max_loops: 10, max_tokens: 30000, timeout_seconds: 300 }
    skills:
      - { id: classify, name: Classify project, description: "Detect project type.", tags: [coding] }

  - slug: dor
    name: coding-agent-dor
    description: Phase 2/8 — Definition-of-Ready validation of the ticket.
    model: *model_9b_deterministic
    pattern: { type: simple }
    prompts: { system_file: prompts/02-dor.md }
    tools: *tools_fs_only
    confirmations: *confirmations_write
    guardrails: { max_loops: 8, max_tokens: 20000, timeout_seconds: 180 }
    skills:
      - { id: dor, name: Definition of Ready, description: "Validate ticket completeness.", tags: [coding, gate] }

  - slug: comprehension
    name: coding-agent-comprehension
    description: Phase 3/8 — synthesise codebase + .agent_docs/ context for the planner.
    model: *model_flash
    pattern: { type: simple }
    prompts: { system_file: prompts/03-comprehension.md }
    tools: *tools_fs_only
    confirmations: *confirmations_write
    guardrails: { max_loops: 20, max_tokens: 80000, timeout_seconds: 600 }
    skills:
      - { id: comprehend, name: Codebase comprehension, description: "Build context bundle for planner.", tags: [coding, context] }

  - slug: planning
    name: coding-agent-planning
    description: Phase 4/8 — emit plan.md, todo.md, and infra_needs.md.
    model: *model_27b_creative
    pattern: { type: simple }
    prompts: { system_file: prompts/04-planning.md }
    tools: *tools_fs_only
    confirmations: *confirmations_write
    guardrails: { max_loops: 15, max_tokens: 60000, timeout_seconds: 600 }
    skills:
      - { id: plan, name: Implementation planning, description: "Plan + TODO + infra needs.", tags: [coding, planning] }

  - slug: e2e-writing
    name: coding-agent-e2e-writing
    description: Phase 5/8 — translate acceptance criteria into runnable E2E tests.
    model: *model_27b_creative
    pattern: { type: simple }
    prompts: { system_file: prompts/05-e2e-writing.md }
    tools: *tools_fs_git
    confirmations: *confirmations_write_commit
    guardrails: { max_loops: 25, max_tokens: 80000, timeout_seconds: 1200 }
    skills:
      - { id: e2e, name: E2E test authoring, description: "Acceptance criteria → pytest.", tags: [coding, tests] }

  - slug: implementation
    name: coding-agent-implementation
    description: Phase 6/8 — iterate on production code until the E2E tests pass.
    model: *model_27b_impl
    pattern: { type: simple }
    prompts: { system_file: prompts/06-implementation.md }
    tools: *tools_fs_git
    confirmations: *confirmations_impl
    # config-a2a caps timeout_seconds at 3600 (agent-coding allows 7200).
    guardrails: { max_loops: 60, max_tokens: 200000, timeout_seconds: 3600 }
    skills:
      - { id: implement, name: Implementation loop, description: "Edit code until E2E tests pass.", tags: [coding, implementation] }

  - slug: review
    name: coding-agent-review
    description: Phase 7/8 — fresh-context review of the diff produced by phase 6.
    model: *model_27b_review
    pattern: { type: simple }
    prompts: { system_file: prompts/07-review.md }
    tools: *tools_fs_git_readonly
    confirmations: *confirmations_write
    guardrails: { max_loops: 15, max_tokens: 60000, timeout_seconds: 600 }
    skills:
      - { id: review, name: Fresh-context review, description: "APPROVED or REQUEST_CHANGES.", tags: [coding, review] }

  - slug: pr-creation
    name: coding-agent-pr-creation
    description: Phase 8/8 — push and open the Pull Request.
    model: *model_27b_pr
    pattern: { type: simple }
    prompts: { system_file: prompts/08-pr-creation.md }
    tools: *tools_fs_git
    confirmations: *confirmations_push
    guardrails: { max_loops: 10, max_tokens: 30000, timeout_seconds: 300 }
    skills:
      - { id: pr, name: Pull Request creation, description: "Push branch and open PR.", tags: [coding, pr] }

  - slug: orchestrator
    name: coding-agent-orchestrator
    description: Drives a user story through the 8 phases by chaining the in-process agents.
    model: *model_orchestrator
    pattern:
      type: orchestrate
      mode: sequential
      agents:
        - { name: classification, a2a_url: "http://localhost:9100/agents/classification" }
        - { name: dor,            a2a_url: "http://localhost:9100/agents/dor" }
        - { name: comprehension,  a2a_url: "http://localhost:9100/agents/comprehension" }
        - { name: planning,       a2a_url: "http://localhost:9100/agents/planning" }
        - { name: e2e_writing,    a2a_url: "http://localhost:9100/agents/e2e-writing" }
        - { name: implementation, a2a_url: "http://localhost:9100/agents/implementation" }
        - { name: review,         a2a_url: "http://localhost:9100/agents/review" }
        - { name: pr_creation,    a2a_url: "http://localhost:9100/agents/pr-creation" }
      aggregator:
        prompt_file: prompts/orchestrator.md
    prompts:
      system: |
        You orchestrate an 8-phase ticket-to-PR pipeline. The phase agents
        communicate by reading and writing files under .agent_work/<ticket_id>/.
        The final output is the PR URL produced by phase 8.
    guardrails: { max_loops: 1, max_tokens: 200000, timeout_seconds: 3600, max_depth: 1 }
    skills:
      - id: ticket-to-pr
        name: Ticket-to-PR
        description: Walks the 8 phases and returns the merged PR URL.
        tags: [coding, pipeline]
        examples:
          - "specs/tickets/CR-001.md"
